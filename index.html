<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Calculadora de Gorjeta Online | Frontend Mentor Challenge</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <header class="main-header">
      <img src="./images/logo.svg" alt="Logo Splitter" />
    </header>

    <main class="calculator-container">
      <form action="" class="calculator-form">
        <section class="input-panel">
          <div class="input-group">
            <label for="bill-input">Conta</label>
            <div class="input-wrapper">
              <img src="./images/icon-dollar.svg" alt="" aria-hidden="true" />
              <input
                type="number"
                name="bill"
                id="bill-input"
                placeholder="0"
                step="0.01"
                min="0"
              />
            </div>
          </div>

          <div class="input-group">
            <span class="label-title">Selecionar Gorjeta %</span>
            <div class="tip-options-grid">
              <button type="button" class="btn-tip" data-percentage="5">
                5%
              </button>
              <button type="button" class="btn-tip" data-percentage="10">
                10%
              </button>
              <button type="button" class="btn-tip" data-percentage="15">
                15%
              </button>
              <button type="button" class="btn-tip" data-percentage="25">
                25%
              </button>
              <button type="button" class="btn-tip" data-percentage="50">
                50%
              </button>

              <input
                type="number"
                name="custom-tip"
                id="custom-tip-input"
                placeholder="Outro"
                min="0"
              />
            </div>
          </div>

          <div class="input-group">
            <div class="label-wrapper">
              <label for="people-input">Número de Pessoas</label>
              <span
                class="error-message"
                id="people-error"
                aria-live="polite"
              ></span>
            </div>
            <div class="input-wrapper">
              <img src="./images/icon-person.svg" alt="" aria-hidden="true" />
              <input
                type="number"
                name="people"
                id="people-input"
                placeholder="0"
                min="1"
              />
            </div>
          </div>
        </section>

        <section class="result-panel">
          <div class="result-display">
            <div class="result-label">
              <p class="result-title">Gorjeta</p>
              <span class="result-subtitle">/ por pessoa</span>
            </div>
            <strong class="result-value">
              $ <span id="tip-amount-result">0.00</span>
            </strong>
          </div>

          <div class="result-display">
            <div class="result-label">
              <p class="result-title">Total</p>
              <span class="result-subtitle">/ por pessoa</span>
            </div>
            <strong class="result-value">
              $ <span id="tip-amount-result">0.00</span>
            </strong>
          </div>

          <button type="reset" class="btn-reset" id="reset-button">
            Limpar
          </button>
        </section>
      </form>
    </main>
  </body>
</html>
